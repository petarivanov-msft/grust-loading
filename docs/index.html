<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>gRust — Loading</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');
body {
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: 'Rajdhani', 'Segoe UI', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url('https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/252490/page_bg_generated_v6b.jpg') center center / cover no-repeat;
    filter: brightness(0.3) blur(3px);
    z-index: 0;
}
.content {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 900px;
    width: 90%;
}
.hero-img {
    width: 100%;
    max-width: 860px;
    border-radius: 8px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    margin-bottom: 30px;
}
.title {
    font-size: 48px;
    font-weight: 700;
    color: #cd412b;
    text-shadow: 0 2px 20px rgba(205,65,43,0.5);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 8px;
}
.subtitle {
    font-size: 18px;
    color: #999;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 30px;
}
.progress-bar-container {
    width: 100%;
    max-width: 500px;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    margin: 0 auto 15px;
    overflow: hidden;
}
.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #cd412b, #e85d3a);
    border-radius: 2px;
    animation: loading 8s ease-in-out infinite;
}
@keyframes loading {
    0% { width: 0%; opacity: 1; }
    50% { width: 85%; opacity: 1; }
    80% { width: 95%; opacity: 0.8; }
    100% { width: 100%; opacity: 0.3; }
}
.status {
    font-size: 14px;
    color: #777;
    letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="content">
    <img class="hero-img" src="https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/252490/library_hero.jpg" alt="gRust">
    <div class="title">gRust</div>
    <div class="subtitle">Skip the Grind</div>
    <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="status" id="status">Connecting...</div>
</div>
<script>
function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode) {
    document.getElementById('status').innerText = 'Joining ' + servername + '...';
}
function SetStatusChanged(status) {
    document.getElementById('status').innerText = status;
}
function SetFilesTotal(total) {}
function SetFilesNeeded(needed) {}
function DownloadingFile(filename) {
    document.getElementById('status').innerText = 'Loading: ' + filename.split('/').pop();
}
</script>
</body>
</html>
